name: CI/CD IoT Pipeline - DevOps & Sec

on:
  push:
    branches: [ "main" ]

jobs:
  security-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do código
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. DEVSECOPS: Scanner de segurança (Trivy)
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      # 3. DEPLOY: Conecta na AWS e atualiza o serviço
      - name: Deploy to AWS EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Instalar Docker e Git na Amazon Linux 2023 caso não existam
            if ! [ -x "$(command -v docker)" ]; then
              sudo dnf update -y
              sudo dnf install -y docker git
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ec2-user
              sudo dnf install -y docker-compose-plugin
            fi

            # Gerenciar a pasta do projeto
            if [ ! -d "iot-pipeline" ]; then
              git clone https://github.com/Jackson9008/iot-pipeline.git
              cd iot-pipeline
            else
              cd iot-pipeline
              git pull origin main
            fi

            # Comando oficial para Amazon Linux 2023 (Docker Compose V2)
            sudo docker compose up -d --build
            
            # Limpeza de imagens antigas para economizar espaço na Free Tier
            sudo docker image prune -f